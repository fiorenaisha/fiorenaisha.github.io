        :root {
            --bg: #eceef1;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --btn-radius: 8px;
            --btn-inner-radius: 4px;
            --link-gap: 14px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--btn-text);
            min-height: 100vh;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            padding: 14px;
        }

        .topbar-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            min-width: 40px;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: background 0.2s;
            color: #000;
            text-decoration: none;
        }

        .topbar-btn:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            text-decoration: none;
        }

        .topbar-btn.subscribe-btn {
            padding: 0 12px;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        .page-wrapper {
            padding-top: 80px;
            padding-bottom: 40px;
        }

        .avatar-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .profile-bio {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.5;
        }

        .social-btn {
            background: transparent;
            border: none;
            padding: 8px;
            cursor: pointer;
            color: #000;
            transition: transform 0.15s;
            line-height: 1;
        }

        .social-btn:hover {
            transform: scale(1.075);
        }

        .social-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
            display: block;
        }

        .link-card {
            display: block;
            background: var(--btn-bg);
            border-radius: var(--btn-radius);
            text-decoration: none;
            color: var(--btn-text);
            transition: background 0.15s, transform 0.1s;
            position: relative;
            margin-bottom: var(--link-gap);
        }

        .link-card:last-child {
            margin-bottom: 0;
        }

        .link-card:hover {
            background: #f5f5f5;
            color: var(--btn-text);
            text-decoration: none;
        }

        .link-card:active {
            transform: scale(0.99);
        }

        .link-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 64px;
            padding: 12px 56px;
            position: relative;
        }

        .link-thumb {
            position: absolute;
            left: 8px;
            top: 8px;
            bottom: 8px;
            width: 48px;
            height: 48px;
            border-radius: var(--btn-inner-radius);
            overflow: hidden;
        }

        .link-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .link-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.2;
            text-align: center;
            color: var(--btn-text);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .link-more-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.15s, background 0.15s;
            color: var(--btn-text);
            padding: 0;
        }

        .link-card:hover .link-more-btn {
            opacity: 1;
            background: rgba(0, 0, 0, 0.08);
        }

        .dots-icon {
            width: 3px;
            height: 11px;
        }

        .footer-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            height: 44px;
            background: #fff;
            border: 1px solid #dde0e4;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
            font-size: 14px;
            font-weight: 600;
            color: #000;
            text-decoration: none;
            transition: background 0.15s;
        }

        .footer-cta:hover {
            background: #f5f5f5;
            color: #000;
            text-decoration: none;
        }

        .footer-links a,
        .footer-links button {
            font-size: 10px;
            color: #000;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            text-decoration: none;
        }

        .footer-links a:hover,
        .footer-links button:hover {
            text-decoration: underline;
        }

        .footer-links .sep {
            padding: 0 4px;
            font-size: 10px;
        }
    </style>
</head>
